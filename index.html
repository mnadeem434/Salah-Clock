<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salah.Today | Bareilly/Raza Standard</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #e6e6e6;
            --green-accent: #008a45;
            --dark-accent: #111111;
            --inactive-opacity: 0.6;
        }

        body { font-family: 'Montserrat', sans-serif; background-color: var(--bg-color); margin: 0; padding: 15px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { width: 100%; max-width: 480px; background: #f0f0f0; padding: 25px; box-shadow: 20px 20px 60px #bebebe, -20px -20px 60px #ffffff; border-radius: 12px; position: relative; }
        
        header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; }
        .title-group h1 { font-size: 2.5rem; line-height: 0.85; margin: 0; font-weight: 900; letter-spacing: -2px; color: var(--dark-accent); }
        .info-panel { text-align: right; }
        .brand { font-weight: 900; font-size: 1.1rem; color: var(--dark-accent); letter-spacing: 1px; }
        #current-date { font-weight: bold; font-size: 0.8rem; margin: 2px 0; }
        #city-display { font-size: 0.5rem; text-transform: uppercase; color: #888; font-weight: 800; }

        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 20px; }
        input, select { padding: 8px; border: 1px solid #ddd; border-radius: 6px; font-family: inherit; font-size: 0.75rem; }

        .prayer-list { display: flex; flex-direction: column; gap: 8px; }
        
        /* INACTIVE STATE: Heavily desaturated and faded */
        .prayer-row { 
            display: flex; height: 50px; border-radius: 5px; overflow: hidden; 
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            filter: grayscale(0.5) opacity(var(--inactive-opacity)); 
            background: #222; position: relative;
        }

        /* ACTIVE STATE: Full color and expanded */
        .prayer-row.active { 
            height: 90px; filter: grayscale(0) opacity(1); 
            box-shadow: 0 10px 20px rgba(0,138,69,0.2); 
            transform: scale(1.02); z-index: 10;
        }

        .icon-box { background: var(--dark-accent); width: 60px; display: flex; justify-content: center; align-items: center; color: white; font-size: 0.75rem; font-weight: bold; z-index: 2; }
        
        .name-box { 
            flex-grow: 1; display: flex; flex-direction: column; justify-content: center; 
            padding-left: 20px; color: white; font-weight: 900; font-size: 1.3rem; 
            position: relative; background: #333; z-index: 1; 
        }

        .progress-fill { 
            position: absolute; left: 0; top: 0; bottom: 0; 
            background: var(--green-accent); width: 100%; 
            z-index: -1; transition: width 1s linear; 
        }

        .countdown { font-size: 0.65rem; font-weight: 400; margin-top: 5px; text-transform: none; display: none; }
        .active .countdown { display: block; }

        .time-box { background: var(--dark-accent); width: 110px; display: flex; justify-content: center; align-items: center; color: white; font-weight: 700; font-size: 1.1rem; z-index: 2; }
        .time-box span { font-size: 0.6rem; margin-left: 3px; color: #888; }

        #loader { position: absolute; inset: 0; background: #f0f0f0; z-index: 100; display: flex; justify-content: center; align-items: center; font-weight: bold; border-radius: 12px; }
    </style>
</head>
<body>

<div class="container">
    <div id="loader">Syncing Raza Timings...</div>
    <header>
        <div class="title-group"><h1>PRAYER<br>TIMES</h1></div>
        <div class="info-panel">
            <div class="brand">SALAH.TODAY</div>
            <div id="current-date">-- --, ----</div>
            <div id="city-display">Detecting...</div>
        </div>
    </header>

    <div class="controls">
        <input type="text" id="manual-city" placeholder="Enter City...">
        <select id="school-select">
            <option value="1" selected>Hanafi (Asr Late)</option>
            <option value="0">Shafi (Asr Early)</option>
        </select>
    </div>

    <div class="prayer-list" id="prayer-container"></div>
</div>

<script>
    let prayerData = null;
    let timerInterval = null;
    const sequenceLayout = [
        {id: "Fajr", label: "FAJR"},
        {id: "Sunrise", label: "SUNRISE"},
        {id: "Dahwa", label: "DAHWA-E-KUBRA"},
        {id: "Dhuhr", label: "DHUHR"},
        {id: "Asr", label: "ASR"},
        {id: "Maghrib", label: "MAGHRIB"},
        {id: "Isha", label: "ISHA"}
    ];
    
    window.onload = () => {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(pos => fetchTimes(pos.coords.latitude, pos.coords.longitude), 
            () => fetchTimesByCity("Bareilly"));
        }
        document.getElementById('manual-city').addEventListener('keypress', (e) => { if(e.key === 'Enter') fetchTimesByCity(e.target.value); });
        document.getElementById('school-select').addEventListener('change', () => fetchTimesByCity(document.getElementById('city-display').innerText));
    };

    async function fetchTimes(lat, lon) {
        const school = document.getElementById('school-select').value;
        const res = await fetch(`https://api.aladhan.com/v1/timings?latitude=${lat}&longitude=${lon}&method=1&school=${school}`);
        const data = await res.json();
        processTimings(data.data);
    }

    async function fetchTimesByCity(city) {
        if(!city || city === "Detecting...") city = "Bareilly";
        const school = document.getElementById('school-select').value;
        const res = await fetch(`https://api.aladhan.com/v1/timingsByCity?city=${city}&country=&method=1&school=${school}`);
        const data = await res.json();
        if(data.code === 200) {
            document.getElementById('city-display').innerText = city;
            processTimings(data.data);
        }
    }

    function processTimings(data) {
        const t = data.timings;
        // Dahwa Calculation
        const fDate = new Date(`1970-01-01T${t.Fajr}:00`);
        const sDate = new Date(`1970-01-01T${t.Sunset}:00`);
        const mid = new Date(fDate.getTime() + (sDate - fDate) / 2);
        t.Dahwa = mid.toTimeString().substring(0, 5);
        
        prayerData = t;
        renderUI(data);
    }

    function renderUI(data) {
        const container = document.getElementById('prayer-container');
        container.innerHTML = '';
        document.getElementById('current-date').innerText = `${data.date.gregorian.day} ${data.date.gregorian.month.en} ${data.date.gregorian.year}`;
        document.getElementById('loader').style.display = 'none';

        sequenceLayout.forEach(item => {
            const time24 = prayerData[item.id];
            const [h, m] = time24.split(':');
            const ampm = h >= 12 ? 'PM' : 'AM';
            const h12 = h % 12 || 12;

            const row = document.createElement('div');
            row.className = 'prayer-row';
            row.id = `row-${item.id.toLowerCase()}`;
            row.innerHTML = `
                <div class="icon-box">${item.id.substring(0,3).toUpperCase()}</div>
                <div class="name-box">
                    <div class="progress-fill" id="fill-${item.id.toLowerCase()}"></div>
                    ${item.label}
                    <div class="countdown" id="count-${item.id.toLowerCase()}"></div>
                </div>
                <div class="time-box">${h12}:${m} <span>${ampm}</span></div>
            `;
            container.appendChild(row);
        });
        startTracking();
    }

    function startTracking() {
        if(timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            const now = new Date();
            let activeIdx = -1;

            const timeObjects = sequenceLayout.map(item => {
                const [h, m] = prayerData[item.id].split(':');
                const d = new Date(); d.setHours(h, m, 0);
                return d;
            });

            // Find current active slot including markers
            for(let i = 0; i < timeObjects.length; i++) {
                const start = timeObjects[i];
                const end = (i === timeObjects.length - 1) ? new Date(timeObjects[0]).setDate(timeObjects[0].getDate() + 1) : timeObjects[i+1];
                if (now >= start && now < end) {
                    activeIdx = i;
                    break;
                }
            }
            if(activeIdx === -1) activeIdx = 6; // Default to Isha window

            const activeItem = sequenceLayout[activeIdx];
            const startT = timeObjects[activeIdx];
            const endT = (activeIdx === 6) ? new Date(timeObjects[0]).getTime() + 86400000 : timeObjects[activeIdx + 1].getTime();
            
            const total = endT - startT.getTime();
            const left = endT - now.getTime();
            const progress = (left / total) * 100;

            // Update UI Bars
            document.querySelectorAll('.prayer-row').forEach(r => r.classList.remove('active'));
            const activeRow = document.getElementById(`row-${activeItem.id.toLowerCase()}`);
            activeRow.classList.add('active');
            
            document.getElementById(`fill-${activeItem.id.toLowerCase()}`).style.width = `${progress}%`;
            
            const h = Math.floor(left / 3600000), m = Math.floor((left % 3600000) / 60000), s = Math.floor((left % 60000) / 1000);
            document.getElementById(`count-${activeItem.id.toLowerCase()}`).innerText = `Ends in: ${h}h ${m}m ${s}s`;
        }, 1000);
    }
</script>
</body>
</html>
